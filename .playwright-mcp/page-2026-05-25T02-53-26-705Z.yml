        - paragraph [ref=e149] [cursor=pointer]: "\"My Lord, I have heard differently,\""
        - paragraph [ref=e150] [cursor=pointer]: Yaxley waited but Voldemort did not speak, so he went on, "Dawlish, the Auror, let slip that Potter will not be moved until the thirtieth, the night before the boy turns seventeen."
        - paragraph [ref=e151] [cursor=pointer]: Snape was smiling,
        - paragraph [ref=e152] [cursor=pointer]: "\"My source told me that there are plans to lay a false trail; this must be it. No doubt a Confundus Charm has been placed upon Dawlish. It would not be the first time; he is known to be susceptible.\""
        - paragraph [ref=e153] [cursor=pointer]: "\"I assure you, my Lord, Dawlish seemed quite certain,\" said Yaxley."
        - paragraph [ref=e154] [cursor=pointer]: "\"If he has been Confunded, naturally he is certain,\" said Snape. \"I assure you, Yaxley, the Auror Office will play no further part in the protection of Harry Potter. The Order believes that we have infiltrated the Ministry.\""
        - paragraph [ref=e155] [cursor=pointer]: "\"The Order's got one thing right, then, eh?\" said a squat man sitting a short distance from Yaxley; he gave a wheezy giggle that was echoed here and there along the table."
