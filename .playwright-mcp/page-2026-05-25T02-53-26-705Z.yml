        - paragraph [ref=e157] [cursor=pointer]: the body revolving slowly overhead, and he seemed to be lost in thought.
        - paragraph [ref=e158] [cursor=pointer]: "\"My Lord,\" Yaxley went on, \"Dawlish believes an entire party of Aurors will be used to transfer the boy - \""
        - paragraph [ref=e159] [cursor=pointer]: Voldemort held up a large white hand, and Yaxley subsided at once, watching resentfully as Voldemort turned back to Snape.
        - paragraph [ref=e160] [cursor=pointer]: "\"Where are they going to hide the boy next?\""
        - paragraph [ref=e161] [cursor=pointer]: "\"At the home of one of the Order,\" said Snape. \"The place, according to the source, has been given every protection that the Order and Ministry together could provide. I think that there is little chance of taking him once he is there, my Lord, unless, of course, the Ministry has fallen before next Saturday, which might give us the opportunity to discover and undo enough of the enchantments to break through the rest.\""
        - paragraph [ref=e162] [cursor=pointer]: "\"Well, Yaxley?\" Voldemort called down the table, the firelight glinting strangely in his red eyes. \"Will the Ministry have fallen by next Saturday?\""
        - paragraph [ref=e163] [cursor=pointer]: Once again, all heads turned. Yaxley squared his shoulders.
        - paragraph [ref=e164] [cursor=pointer]: "\"My Lord, I have good news on that score. I have - with difficulty, and after great effort - succeeded in placing an Imperius Curse upon Pius Thicknesse.\" Many of those sitting around Yaxley looked impressed; his neighbor, Dolohov, a man with a long, twisted face, clapped him on the back."
        - paragraph [ref=e165] [cursor=pointer]: "\"It is a start,\" said Voldemort. \"But Thicknesse is only one man. Scrimgeour must be surrounded by our people before I act. One failed attempt on the Minister's life will set me back a long way.\""
        - paragraph [ref=e166] [cursor=pointer]: "\"Yes - my Lord, that is true - but you know, as Head of the Department of Magical Law Enforcement, Thicknesse has regular"
        - paragraph [ref=e167] [cursor=pointer]: Chapter 1
        - paragraph [ref=e168] [cursor=pointer]: contact not only with the Minister himself, but also with the Heads of all the other Ministry departments. I will, I think, be easy now that we have such a high-ranking official under our control, to subjugate the others, and then they can all work together to bring Scrimgeour down."
        - paragraph [ref=e169] [cursor=pointer]: "\"As long as our friend Thicknesse is not discovered before he has converted the rest,\" said Voldemort. \"At any rate, it remains unlikely that the Ministry will be mine before next Saturday. If we cannot touch the boy at his destination, the it must be done while he travels.\""
        - paragraph [ref=e170] [cursor=pointer]: "\"We are at an advantage there, my Lord,\" said Yaxley, who seemed determined to receive some portion of approval. \"We now have several people planted within the Department of Magical Transport. If Potter Apparates or uses the Floo Network, we shall know immediately.\""
        - paragraph [ref=e171] [cursor=pointer]: "\"He will not do either,\" said Snape. \"The order is eschewing any form of transport that is controlled or regulated by the Ministry; they mistrust everything to do with the place.\""
        - paragraph [ref=e172] [cursor=pointer]: "\"All the better,\" said Voldemort. \"He will have to move in the open. Easier to take, by far.\""
        - paragraph [ref=e173] [cursor=pointer]: Again, Voldemort looked up at the slowly revolving body as he went on, "I shall attend to the boy in person. There have been too many mistakes where Harry Potter is concerned. Some of them have been my own. That Potter lives is due more to my errors than to his triumphs."
        - paragraph [ref=e174] [cursor=pointer]: The company around the table watched Voldemort apprehensively, each of them, by his or her expression, afraid that they might be blamed for Harry Potter's continued existence. Voldemort, however, seemed to be speaking more to himself than to any
        - paragraph [ref=e175] [cursor=pointer]: of them, still addressing the unconscious body above him.
        - paragraph [ref=e176] [cursor=pointer]: "\"I have been careless, and so have been thwarted by luck and chance, those wreckers of all but the best-laid plans. But I know better now. I understand those things that I did not understand before. I must be the one to kill Harry Potter, and I shall be.\""
        - paragraph [ref=e177] [cursor=pointer]: At these words, seemingly in response to them, a sudden wail sounded, a terrible, drawn-out cry of misery and pain. Many of those at the table looked downward, startled, for the sound had seemed to issue from below their feet.
        - paragraph [ref=e178] [cursor=pointer]: "\"Wormtail,\" said Voldemort, with no change in his quiet, thoughtful tone, and without removing his eyes from the revolving body above, \"have I not spoken to you about keeping our prisoner quiet?\""
        - paragraph [ref=e179] [cursor=pointer]: "\"Yes, m-my Lord,\" gasped a small man halfway down the table, who had been sitting so low in his chair that it had appeared, at first glance, to be unoccupied. Now he scrambled from his seat and scurried from the room, leaving nothing behind him but a curious gleam of silver."
        - paragraph [ref=e180] [cursor=pointer]: "\"As I was saying,\" continued Voldemort, looking again at the tense faces of his followers, \"I understand better now. I shall need, for instance, to borrow a wand from one of you before I go to kill Potter.\""
        - paragraph [ref=e181] [cursor=pointer]: The faces around his displayed nothing but shock; he might have announced that he wanted to borrow one of their arms.
        - paragraph [ref=e182] [cursor=pointer]: "\"No volunteers?\" said Voldemort. \"Let's see . . . Lucius, I see no reason for you to have a wand anymore.\""
        - paragraph [ref=e183] [cursor=pointer]: Lucius Malfoy looked up. His skin appeared yellowish and waxy in the firelight, and his eyes were sunken and shadowed. When he spoke, his voice was hoarse.
        - paragraph [ref=e184] [cursor=pointer]: Chapter 1
        - paragraph [ref=e185] [cursor=pointer]: "\"My Lord?\""
        - paragraph [ref=e186] [cursor=pointer]: "\"Your wand, Lucius. I require your wand.\""
        - paragraph [ref=e187] [cursor=pointer]: "\"I . . . \""
        - paragraph [ref=e188] [cursor=pointer]: Malfoy glanced sideways at his wife. She was staring straight ahead, quite as pale as he was, her long blonde hair hanging down her back, but beneath the table her slim fingers closed briefly on his wrist. At her touch, Malfoy put his hand into his robes, withdrew a wand, and passed it along to Voldemort, who held it up in from of his red eyes, examining it closely.
        - paragraph [ref=e189] [cursor=pointer]: "\"What is it?\""
        - paragraph [ref=e190] [cursor=pointer]: "\"Elm, my Lord,\" whispered Malfoy."
        - paragraph [ref=e191] [cursor=pointer]: "\"And the core?\""
        - paragraph [ref=e192] [cursor=pointer]: "\"Dragon - dragon heartstring.\""
        - paragraph [ref=e193] [cursor=pointer]: "\"Good,\" said Voldemort. He drew out his own wand and compared the lengths. Lucius Malfoy made an involuntary movement; for a fraction of a second, it seemed he expected to receive Voldemort's want in exchange for his own. The gesture was not missed by Voldemort, whose eyes widened maliciously."
        - paragraph [ref=e194] [cursor=pointer]: "\"Give you my wand, Lucius? My wand?\""
        - paragraph [ref=e195] [cursor=pointer]: Some of the throng sniggered.
        - paragraph [ref=e196] [cursor=pointer]: "\"I have given you your liberty, Lucius, is that not enough for you? But I have noticed that you and your family seem less than happy of late . . . What is it about my presence in your home that displeases you, Lucius?\""
        - paragraph [ref=e197] [cursor=pointer]: "\"Nothing - nothing, my Lord!\""
        - paragraph [ref=e198] [cursor=pointer]: "\"Such lies, Lucius . . . \""
        - paragraph [ref=e199] [cursor=pointer]: The soft voice seems to hiss on even after the cruel mouth had stopped moving. One or two of the wizards barely repressed a shudder as the hissing grew louder; something heavy could be heard
        - paragraph [ref=e200] [cursor=pointer]: sliding across the floor beneath the table.
        - paragraph [ref=e201] [cursor=pointer]: The huge snake emerged to climb slowly up Voldemort's chair. It rose, seemingly endlessly, and came to rest across Voldemort's shoulders; its neck the thickness of a man's thigh; its eyes, with their vertical slits for pupils, unblinking. Voldemort stroked the creature absently with long thin fingers, still looking at Lucius Malfoy.
        - paragraph [ref=e202] [cursor=pointer]: "\"Why do the Malfoys look so unhappy with their lot? Is my return, my rise to power, not the very thing they professed to desire for so many years?\""
        - paragraph [ref=e203] [cursor=pointer]: "\"Of course, my Lord,\" said Lucius Malfoy. His hand shook as he wiped sweat from his upper lip. \"We did desire it - we do.\""
        - paragraph [ref=e204] [cursor=pointer]: To Malfoy's left, his wife made an odd, stiff nod, her eyes averted from Voldemort and the snake. To his right, his son, Draco, who had been gazing up at the inert body overhead, glanced quickly at Voldemort and away again, terrified to make eye contact.
        - paragraph [ref=e205] [cursor=pointer]: "\"My Lord,\" said a dark woman halfway down the table, her voice constricted with emotion, \"it is an honor to have you here, in our family's house. There can be no higher pleasure.\""
        - paragraph [ref=e206] [cursor=pointer]: She sat beside her sister, as unlike her in looks, with her dark hair and heavily lidded eyes, as she was in bearing and demeanor; where Narcissa sat rigid and impassive, Bellatrix leaned toward Voldemort, for mere words could not demonstrate her longer for closeness.
        - paragraph [ref=e207] [cursor=pointer]: "\"No higher pleasure,\" repeated Voldemort, his head tilted a little to one side as he considered Bellatrix. \"That means a great deal, Bellatrix, from you,\""
        - paragraph [ref=e208] [cursor=pointer]: Her face flooded with color; her eyes welled with tears of delight.
        - paragraph [ref=e209] [cursor=pointer]: "\"My Lord knows I speak nothing but the truth!\""
        - paragraph [ref=e210] [cursor=pointer]: Chapter 1
