        - paragraph [ref=e122] [cursor=pointer]: "\"News?\" asked the taller of the two."
        - paragraph [ref=e123] [cursor=pointer]: "\"The best,\" replied Severus Snape."
        - paragraph [ref=e124] [cursor=pointer]: The lane was bordered on the left by wild, low-growing brambles, on the right by a high, nearty manicured hedge. The men's long cloaks flapped around their ankles as they marched.
        - paragraph [ref=e125] [cursor=pointer]: "\"Thought I might be late,\" said Yaxley, his blunt features sliding in and out of sight as the branches of overhanging tress broke the moonlight. \"It was a little trickier than I expected. But I hope he will be satisfied. You should confident that your reception will"
        - paragraph [ref=e126] [cursor=pointer]: Chapter 1
        - paragraph [ref=e127] [cursor=pointer]: be good?"
        - paragraph [ref=e128] [cursor=pointer]: "Snape nodded, but did not elaborate. They turned right, into a wide driveway that led off the lane. The high hedge curved with them, running off into the distance beyond the pair of impressive wrought-iron gates barring the men's way. Neither of them broke step: In silence both raised their left arms in a kind of salute and passed straight through, as though the dark metal were smoke."
        - paragraph [ref=e129] [cursor=pointer]: The yew hedges muffled the sound of the men's footsteps. There was a rustle somewhere to their right; Yaxley drew his wand again, pointing it over his companion's head, but the source of the noise proved to be nothing more than a pure-white peacock, strutting majestically along the top of the hedge.
        - paragraph [ref=e130] [cursor=pointer]: "\"He always did himself well, Lucius. Peacocks . . . \" Yaxley thrust his wand back under his cloak with a snort."
        - paragraph [ref=e131] [cursor=pointer]: A handsome manor house grew out of the darkness at the end of the straight drive, lights glinting in the diamond-paned downstairs windows. Somewhere in the dark garden beyond the hedge a fountain was playing. Gravel crackled beneath their feet as Snape and Yaxley sped toward the front door, which swung inward at their approach, though nobody had visibly opened it.
        - paragraph [ref=e132] [cursor=pointer]: The hallway was large, dimly light, and sumptuously decorated, with a magnificent carpet covering most of the stone floor. The eyes of the pale-faced portraits on the walls followed Snape and Yaxley as they strode past. The two men halted at a heavy wooden door leading into the next room, hesitated for the space of a heartbeat, then Snape turned the bronze handle.
        - paragraph [ref=e133] [cursor=pointer]: The drawing room was full of silent people, sitting at a long and ornate table. The room's usual furniture had been pushed carelessly up against the walls. Illumination came from a roaring fire
        - paragraph [ref=e134] [cursor=pointer]: beneath a handsome marble mantelpiece surmounted by a gilded mirror. Snape and Yaxley lingered for a moment on the threshold. As their eyes grew accustomed to the lack of light, they were drawn upward to the strangest feature of the scene; an apparently unconscious human figure hanging upside down over the table, revolving slowly as if suspended by an invisible rope, and reflected in the mirror and in the bare, polished surface of the table below. He seemed unable to prevent himself from glancing upward every minute or so.
        - paragraph [ref=e135] [cursor=pointer]: "\"Yaxley, Snape,\" said a high, clear voice from the head of the table. \"You are very nearly late.\""
        - paragraph [ref=e136] [cursor=pointer]: The speaker was seated directly in front of the fireplace, so that it was difficult, at first, for the new arrivals to make out more than his silhouette. As they drew nearer, however, this face shone through the gloom, hairless, snakelike, with slits for nostrils and gleaming red eyes whose pupils were vertical. He was so pale that he seemed to emit a pearly glow.
        - paragraph [ref=e137] [cursor=pointer]: "\"Severus, here,\" said Voldemort, indicating the seat on his immediate right. \"Yaxley - beside Dolohov.\""
        - paragraph [ref=e138] [cursor=pointer]: The two men took their allotted places. Most of the eyes around the table followed Snape, and it was to him that Voldemort spoke first.
        - paragraph [ref=e139] [cursor=pointer]: "\"So?\""
        - paragraph [ref=e140] [cursor=pointer]: "\"My Lord, the Order of the Phoenix intends to move Harry Potter from his current place of safety on Saturday next, at nightfall.\""
        - paragraph [ref=e141] [cursor=pointer]: The interest around the table sharpened palpably; Some stiffened, others fidgeted, all gazing at Snape and Voldemort.
        - paragraph [ref=e142] [cursor=pointer]: "\"Saturday . . . at nightfall,\" repeated Voldemort. His red eyes"
        - paragraph [ref=e143] [cursor=pointer]: Chapter 1
        - paragraph [ref=e144] [cursor=pointer]: fastened upon Snape's black ones with such intensity that some of the watchers looked away, apparently fearful that they themselves would be scorched by the ferocity of the gaze. Snape, however, looked calmly back into Voldemort's face and, after a moment or two. Voldemort's lipless mouth curved into something like a smile.
        - paragraph [ref=e145] [cursor=pointer]: "\"Good. Very good. And this information comes - \""
        - paragraph [ref=e146] [cursor=pointer]: "\" - from the source we discussed,\" said Snape."
        - paragraph [ref=e147] [cursor=pointer]: "\"My Lord.\""
