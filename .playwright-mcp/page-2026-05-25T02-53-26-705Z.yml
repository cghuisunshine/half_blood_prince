        - paragraph [ref=e212] [cursor=pointer]: She stared at him, her lips parted, evidently confused.
        - paragraph [ref=e213] [cursor=pointer]: "\"I don't know what you mean, my Lord.\""
        - paragraph [ref=e214] [cursor=pointer]: "\"I'm talking about your niece, Bellatrix. And your, Lucius and Narcissa. She has just married the werewolf, Remus Lupin. You must be so proud.\""
        - paragraph [ref=e215] [cursor=pointer]: There was an eruption of jeering laughter from around the table. Many leaned forward to exchange gleeful looks, a few thumped the table with their fists. The great snake, disliking the disturbance, opened its mouth and hissed angrily, but the Death Eaters did not hear it, so jubilant were they at Bellatrix and the Malfoys' humiliation. Bellatrix's face, so recently flushed with happiness, had turned an ugly, blotchy red.
        - paragraph [ref=e216] [cursor=pointer]: "\"She is no niece of ours, my Lord,\" she cried over the outpouring of mirth. \"We - Narcissa and I - have never set eyes on our sister since she married the Mudblood. This brat has nothing to do with either of us, nor any beast she marries.\""
        - paragraph [ref=e217] [cursor=pointer]: "\"What say you, Draco?\" asked Voldemort, and though his voice was quiet, it carried clearly through the catcalls and jeers. \"Will you babysit the cubs?\""
        - paragraph [ref=e218] [cursor=pointer]: The hilarity mounted; Draco Malfoy looked in terror at his father, who was staring down into his own lap, then caught his mother's eye. She shook her head almost imperceptibly, then resumed her own deadpan stare at the opposite wall.
        - paragraph [ref=e219] [cursor=pointer]: "\"Enough,\" said Voldemort, stroking the angry snake. \"Enough.\""
        - paragraph [ref=e220] [cursor=pointer]: And the laughter died at once.
        - paragraph [ref=e221] [cursor=pointer]: "\"Many of our oldest family trees become a little diseased over"
        - paragraph [ref=e222] [cursor=pointer]: time," he said as Bellatrix gazed at him, breathless and imploring. "You must prune yours, must you not, to keep it healthy? Cut away those parts that threaten the health of the rest."
        - paragraph [ref=e223] [cursor=pointer]: "\"Yes, my Lord,\" whispered Bellatrix, and her eyes swam with tears of gratitude again. \"At the first chance!\""
        - paragraph [ref=e224] [cursor=pointer]: "\"You shall have it,\" said Voldemort. \"And in your family, so in the world . . . we shall cut away the canker that infects us until only those of the true blood remain . . . \""
